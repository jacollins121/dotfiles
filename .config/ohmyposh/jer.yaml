# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

palette:
  blue: "#8AADF4"
  green: "#01B158"
  lavender: "#B7BDF8"
  lightRed: "#C03F4D"
  text: "#494D64"
transient_prompt:
  template: ❯
  foreground: p:lavender
  background: transparent
blocks:
- type: prompt
  alignment: left
  segments:
  - properties:
      cache_duration: none
    leading_diamond: 
    template: "{{ .UserName }}"
    foreground: p:text
    powerline_symbol: 
    background: p:blue
    type: text
    style: diamond
  - properties:
      branch_icon: "\ue725 "
      cache_duration: none
      cherry_pick_icon: "\ue29b "
      commit_icon: "\uf417 "
      fetch_status: true
      fetch_upstream_icon: false
      merge_icon: "\ue727 "
      no_commits_icon: "\uf0c3 "
      rebase_icon: "\ue728 "
      revert_icon: "\uf0e2 "
      tag_icon: "\uf412 "
    template: " {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}+{{ end }}"
    foreground: p:text
    powerline_symbol: 
    background: p:green
    type: git
    style: powerline
  - properties:
      cache_duration: none
      folder_icon: ....
      home_icon: "~"
      style: agnoster_full
    template: " {{ .Path }}"
    foreground: p:text
    powerline_symbol: 
    type: path
    style: powerline
    background_templates:
    - "{{ if gt .Code 0 }}p:lightRed{{ end }}"
    - "{{ if eq .Code 0 }}p:lavender{{ end }}"
  - properties:
      cache_duration: none
      fetch_status: true
      fetch_upstream_icon: false
      merge_icon: "\ue727 "
      no_commits_icon: "\uf0c3 "
      rebase_icon: "\ue728 "
      revert_icon: "\uf0e2 "
      tag_icon: "\uf412 "
    template: " {{ if gt .Behind 0 }}↓{{ end }}{{ if gt .Ahead 0 }}↑{{ end }}"
    foreground: p:blue
    background: transparent
    type: git
    style: plain
  newline: true
version: 3
final_space: true
